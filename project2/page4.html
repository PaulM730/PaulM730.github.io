<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Obstacle</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <section class="container">
       <h1>The First Obstacle</h1>
       <p>As you venture deeper into the Dark Forest, you encounter a mystical guardian. 
            The guardian blocks your path and poses a riddle:</p>

            
            <p>"I speak without a mouth and hear without ears. 
                I have no body, but I come alive with wind. What am I?”</p>

            <br></br>

            <form id="Obstacle1" type="get" action="page5.html">
                <label  for="answer">Your Answer: </label>
                
                <input type="text" id="answer" name="answer" placeholder="echo">
                
                <input type="submit" id="submitButton" value="Submit Answer" style="color:white; background-color: red;" >

            </form>

    </section>

    <script>
       const answer = document.getElementById("answer");
       const submit = document.getElementById("submitButton");


       function checkRiddleAnswer(correct, input){
        if (input.toUpperCase() === correct.toUpperCase()){
            submit.style.backgroundColor="green";
            submit.style.color = "white";
        }else{
            submit.style.backgroundColor = "red";
            submit.style.color = "white";
        }
       }

       answer.addEventListener("input", function() {
        checkRiddleAnswer("echo", answer.value);
});

    </script>
</body>
</html>
