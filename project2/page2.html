<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <section class="container">
        <form id="characterForm" type="get" action="page3.html">

            <h1><strong>Choose Your Character</strong></h1>
        <fieldset>

            
            <legend>Choose Your Character</legend>

            <input type="radio" id="Aria" name="character" value="warrior">
            <label for="Aria"><strong>Aria, the Warrior:</strong> Strong and brave, with
            the ability to overcome physical obstacles.</label>
            <br><br>
            <input type="radio" id="eldrin" name="character" value="mage">
            <label for="eldrin"><strong>Eldrin, the Mage:</strong> Wise and knowledgeable, with
            the power to solve puzzles and cast spells</label>
            <br><br>

            <input type="radio" id="tara" name="character" value="rogue">
            <label for="tara"><strong>Tara, the Rogue:</strong> Quick and cunnning, with 
            the skills in stealth and persuasion</label>
            
        </fieldset>

        <input type="submit" value="Continue">

        </form>

    </section>
</body>
</html>
