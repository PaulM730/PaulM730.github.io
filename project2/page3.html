<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest Begins</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <section class="container">
        <h1>Pack Your Bag</h1>
        <p>Select the supplies you wish to take on your quest. 
            Choose wisely, as you can only carry a limited amount.</p>

        <form id="BackPacking" type="get" action="page4.html">

            <fieldset>
                <input type="checkbox" id="food" name="supplies" value="food">
                <label for="food">Food: Essential for Energy</label>
                <br><br>

                <input type="checkbox" id="water" name="supplies" value="water">
                <label for="water">Water: Hydration is key!</label>
                <br><br>

                <input type="checkbox" id="potion" name="supplies" value="potion">
                <label for="potion">Magic Potions: For health and magical energy</label>
                <br><br>

                <input type="checkbox" id="map" name="supplies" value="map">
                <label for="map">Maps: Dont get lost in the wilderness!</label>
                <br><br>

                <input type="checkbox" id="sword" name="supplies" value="sword">
                <label for="sword">Sword: Fend off those pesky foes!</label>
                <br><br>

            </fieldset>

            <input type="submit" value="Continue">

        </form>
    </section>
</body>
</html>
