<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addIncome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

</head>
<body>
    <h1>Add Income</h1>
    <form id="addIncome">

    <div class="mb-3">
    <label  for="incomeSource" class="form-label">Income Source Name: </label>
                
        <input type="name" class="form-control" id="incomeSource"" 
        required 
        minlength="3" title="Please enter a name with the minium length of 3 letters">

    </div>

    <div class="mb-3">
    <label  for="amount" class="form-label">Amount: </label>

        <input type="number" class="form-control" id="amount"" 
        required 
        min="0" step="0.01" title="Please enter an amount that is greather than 0 and rounded to the first 2 decimal places">
    
    </div>

    <div class="mb-3">
    <label  for="frequency" class="form-label">Frequency: </label>

        <select id="frequency" class="form-control">
                <option value="default"></option>
                <option value="one-time">one-time</option>
                <option value="bi-weekly">Bi-weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
        </select>
        </div>
        <button type="submit" onclick="location.href='addExpenses.html'" class="btn btn-primary">Submit</button>
    </form>

    <script src="addIncomeScript.js" defer></script>

</body>
</html>
