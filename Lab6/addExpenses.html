<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addExpenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

</head>
<body>
    <h1>Add Expenses</h1>
    <form id="addExpenses">

    <div class="mb-3">
    <label  for="expensesPlace" class="form-label">Place of Expenses: </label>
                
        <input type="name" class="form-control" id="expensesPlace"" 
        required 
        minlength="5" title="Please enter a place with the minium length of 5 letters">

    </div>

    <div class="mb-3">
    <label  for="expensesDate" class="form-label">Place of Expenses: </label>
                
        <input type="date" class="form-control" id="expensesDate"" 
        required 
        #how to make before todays date>

    </div>

    <div class="mb-3">
    <label  for="amount" class="form-label">Amount: </label>

        <input type="number" class="form-control" id="amount"" 
        required 
        min="0"
        max="50000" title="Please enter an amount that is greather than 0 and less than 50k">
    
    </div>

    <div class="input-group mb-3">
        <label for="category" class="form-label">Select a Category of expense</label>
    </div>

    <div class="form-check">
  <input class="form-check-input" type="checkbox" value="" id="checkDefault">
  <label class="form-check-label" for="checkDefault">
    Default checkbox
  </label>
</div>

    <div class="mb-3 form-check">
    <label  for="catergory" class="form-label">Expense Catergory: </label>

    <br></br>

    <label class="form-check-label" for="catergory1">Groceries</label>
        <input type="checkbox" class="form-check-input" id="catergory1"> 
        
        
    
    </div>

    <div class="mb-3">
    <label  for="mode" class="form-label">Mode of Payment: </label>

        <select id="mode" class="form-control">
                <option value="default"></option>
                <option value="credit">Credit Card</option>
                <option value="debit">Debit Card</option>
                <option value="cash">Cash</option>
        </select>
        </div>
        <button type="submit" onclick="location.href='addExpenses.html'" class="btn btn-primary">Submit</button>
    </form>

    <script src="addExpensesScript.js" defer></script>

</body>
</html>
