<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>addExpenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

</head>
<body>
    <h1>Add Expenses</h1>
    <form id="addExpenses">

    <div class="mb-3">
    <label  for="expensesPlace" class="form-label">Place of Expenses: </label>
                
        <input type="name" class="form-control" id="expensesPlace"" 
        required 
        minlength="5" title="Please enter a place with the minium length of 5 letters">

    </div>

    <div class="mb-3">
    <label  for="expensesDate" class="form-label">Place of Expenses: </label>
                
        <input type="date" class="form-control" id="expensesDate"" 
        required 
        #how to make before todays date>

    </div>

    <div class="mb-3">
    <label  for="amount" class="form-label">Amount: </label>

        <input type="number" class="form-control" id="amount"" 
        required 
        min="0"
        max="50000" title="Please enter an amount that is greather than 0 and less than 50k">
    
    </div>


    <div class="mb-3 form-check">
    <label  for="catergory" class="form-label">Catergory of Expenses: </label>

    <br></br>

    <label class="form-check-label" for="catergory1">Groceries</label>
        <input type="checkbox" class="form-check-input" id="catergory1"> 
        <br></br>

    <label class="form-check-label" for="catergory2">Business</label>
        <input type="checkbox" class="form-check-input" id="catergory2"> 
        <br></br>

        <label class="form-check-label" for="catergory3">Restaurants</label>
        <input type="checkbox" class="form-check-input" id="catergory3"> 
        <br></br>

        <label class="form-check-label" for="catergory4">Rent/Housing</label>
        <input type="checkbox" class="form-check-input" id="catergory4"> 
        <br></br>

        <label class="form-check-label" for="catergory5">Fun</label>
        <input type="checkbox" class="form-check-input" id="catergory5"> 
        <br></br>
        
        
    
    </div>

    <div class="mb-3">
    <label  for="mode" class="form-label">Mode of Payment: </label>

        <select id="mode" class="form-control">
                <option value="default"></option>
                <option value="credit">Credit Card</option>
                <option value="debit">Debit Card</option>
                <option value="cash">Cash</option>
        </select>
        </div>

        <div class="mb-3">
            <textarea id="message" name="message" placeholder="Explaination of expenses if needed..."></textarea>
                <style>
                #message {width: 85%; height: 90px; font-size: 16px}
                </style>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>


    </form>



    <script src="addExpensesScript.js" defer></script>

</body>
</html>
