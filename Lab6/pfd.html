<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="<The link from getbootstrap.com>" rel="stylesheet">
    #ADD BOOSTRAP LINK HERE^
</head>
<body>
    <h1>Add Income</h1>
    <form>
    
    <label  for="incomeSource"><Strong>Income Source Name: </Strong></label>
                
        <input type="name" id="incomeSource"  style="width:140px" 
        required 
        minlength="3" title="Please enter a name with the minium length of 3 letters">


    <label  for="amount"><Strong>Amount: </Strong></label>

        <input type="number" id="amount"  style="width:130px" 
        required 
        min="0" title="Please enter an amount greater than 0"
        step="0.01" title="Please enter an amount that is rounded to the first 2 decimal places">
        #USE .TOFIX HERE

    <label  for="frequency"><Strong>Frequency: </Strong></label>

        <select id="frequency">
                <option value="default"></option>
                <option value="one-time">one-time</option>
                <option value="bi-weekly">Bi-weekly</option>
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
        </select>

        <button type="submit">Submit</button>
    
    </form>


</body>
</html>
